<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notes Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Notes Manager</h1>
        <div class="form-card">
            <h2 id="form-title">Add New Note</h2>
            <input type="hidden" id="note-id">
            <input type="text" id="title" placeholder="Note Title">
            <input type="text" id="subject" placeholder="Subject">
            <textarea id="description" placeholder="Description"></textarea>
            <div class="form-buttons">
                <button id="save-btn" onclick="saveNote()">Add Note</button>
                <button id="cancel-btn" onclick="cancelEdit()" style="display: none;">Cancel</button>
            </div>
        </div>

        <div class="notes-section">
            <h2>All Notes</h2>
            <div id="notes-list" class="notes-list">
                <!-- Notes will be loaded here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
